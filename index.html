<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>まるくしゃマッサージ回数券</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", sans-serif; 
            background-color: #fdfaf5; 
            color: #5d4037; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh; 
        }
        .container { width: 100%; max-width: 400px; }
        .center { text-align: center; }
        
        /* イラストエリア */
        .char-box { 
            width: 130px; height: 130px; margin: 0 auto 15px; 
            border-radius: 50%; background-color: #fff; 
            border: 3px solid #e7d8c9; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; cursor: pointer; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .char-img { width: 100%; height: 100%; object-fit: cover; }
        .char-msg { font-size: 11px; color: #bcaaa4; text-align: center; padding: 10px; line-height: 1.4; pointer-events: none; }
        
        h1 { font-size: 24px; font-weight: bold; margin-bottom: 6px; color: #5d4037; }
        .tag { 
            display: inline-block; padding: 4px 14px; background-color: #e8f5e9; 
            color: #2e7d32; font-size: 11px; border-radius: 20px; font-weight: bold; margin-bottom: 24px; 
        }
        
        /* タイマー表示エリア */
        .timer-display {
            background-color: #8d6e63;
            color: white;
            border-radius: 20px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            display: none; /* 通常は非表示 */
            box-shadow: 0 4px 12px rgba(141, 110, 99, 0.3);
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .timer-label { font-size: 12px; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        .timer-time { font-size: 32px; font-weight: bold; font-variant-numeric: tabular-nums; }

        /* チケット本体 */
        .ticket { 
            background: #ffffff; border: 2px dashed #8d6e63; border-radius: 28px; 
            padding: 24px; box-shadow: 0 10px 20px rgba(141, 110, 99, 0.1); 
            position: relative;
        }
        .ticket-row { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            border-bottom: 1px solid #f3f0ee; padding-bottom: 12px; margin-bottom: 24px; 
        }
        .label { font-size: 11px; color: #a1887f; text-transform: uppercase; letter-spacing: 0.5px; }
        .num-big { font-size: 48px; font-weight: bold; color: #8d6e63; line-height: 1; }
        .price-text { font-size: 22px; font-weight: bold; color: #795548; }
        
        /* スタンプカード */
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
        .slot { 
            aspect-ratio: 1; border: 2px dashed #e0d7d3; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: bold; color: #d7ccc8; background: #fafafa; transition: 0.3s; 
        }
        .slot-done { 
            background-color: #8d6e63; border: 2px solid #8d6e63; color: #fff; 
            transform: scale(0.9) rotate(-8deg); box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        
        /* ボタン */
        .btn-use { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            background-color: #8d6e63; color: white; font-size: 18px; font-weight: bold; 
            box-shadow: 0 6px 15px rgba(141, 110, 99, 0.2); cursor: pointer; 
        }
        .btn-use:active { transform: scale(0.97); }
        .btn-use:disabled { background-color: #d7ccc8; cursor: not-allowed; }
        
        /* 補充エリア */
        .reload-box { 
            margin-top: 20px; background: #fff; border-radius: 20px; 
            padding: 15px; border: 1px solid #ffcdd2; display: none; 
        }
        .reload-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .btn-pay { 
            width: 100%; padding: 14px; background-color: #ff0033; color: white; 
            border: none; border-radius: 14px; font-weight: bold; font-size: 15px; 
        }
        
        .footer { font-size: 11px; color: #bcaaa4; text-align: center; margin-top: 20px; }
        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #3e2723; color: white; 
            padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: bold; 
            opacity: 0; transition: 0.3s; pointer-events: none; z-index: 100;
        }
        .toast.on { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        .reset-btn { margin-top: 50px; font-size: 11px; color: #d7ccc8; text-decoration: underline; background: none; border: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="center">
            <label for="file-in" class="char-box">
                <img id="char-view" class="char-img" style="display:none">
                <div id="char-txt" class="char-msg">タップして<br>イラストを選択</div>
                <input type="file" id="file-in" accept="image/*" style="display:none" onchange="hdlImg(this)">
            </label>
            
            <h1>まるくしゃマッサージ</h1>
            <div class="tag">有効期限なし</div>
        </div>

        <!-- タイマー表示 -->
        <div id="timer-box" class="timer-display">
            <div class="timer-label">至福のマッサージ中...</div>
            <div id="timer-text" class="timer-time">10:00</div>
        </div>

        <div class="ticket">
            <div class="ticket-row">
                <div>
                    <span class="label">REMAINING</span><br>
                    <span id="cnt" class="num-big">10</span><span style="font-weight:bold; color:#8d6e63;">枚</span>
                </div>
                <div style="text-align:right">
                    <span class="label">AMOUNT</span><br>
                    <span class="price-text">1セット</span>
                </div>
            </div>

            <div class="grid" id="grid"></div>

            <button id="btn" class="btn-use" onclick="doUse()">チケットを1枚使う (10分)</button>
            <p class="footer">お疲れ様ですも。ゆっくり休んでくださいね。</p>
        </div>

        <div id="reload" class="reload-box">
            <div class="reload-row">
                <span style="font-weight:bold">10枚補充する</span>
                <span style="color:#d32f2f; font-weight:bold">1セット</span>
            </div>
            <button class="btn-pay" onclick="doPay()">アプリで補充する</button>
        </div>

        <button class="reset-btn" onclick="doReset()">データをリセット</button>
    </div>

    <div id="tst" class="toast"></div>

    <script>
        const K_CNT = 'maru_v6_c'; 
        const K_IMG = 'maru_v6_i';
        const K_TMR = 'maru_v6_t'; // 終了時刻保存用
        let rem = 10;
        let timerInterval = null;

        function startup() {
            const c = localStorage.getItem(K_CNT);
            if (c !== null) rem = parseInt(c);
            const i = localStorage.getItem(K_IMG);
            if (i) {
                const v = document.getElementById('char-view');
                v.src = i; v.style.display = 'block';
                document.getElementById('char-txt').style.display = 'none';
            }
            draw();
            checkTimer(); // ページを開いたときにタイマーが動いているか確認
        }

        function draw() {
            document.getElementById('cnt').innerText = rem;
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                if (i < (10 - rem)) {
                    s.classList.add('slot-done');
                    s.innerHTML = '✔';
                } else {
                    s.innerText = i + 1;
                }
                g.appendChild(s);
            }
            const b = document.getElementById('btn');
            const r = document.getElementById('reload');
            if (rem <= 0) {
                b.disabled = true; b.innerText = '終了しました';
                r.style.display = 'block';
            } else {
                b.disabled = false; b.innerText = 'チケットを1枚使う (10分)';
                r.style.display = 'none';
            }
        }

        function doUse() {
            if (rem > 0) {
                rem--; localStorage.setItem(K_CNT, rem);
                
                // 10分後の時刻を記録 (10 * 60 * 1000 ミリ秒)
                const endTime = Date.now() + (10 * 60 * 1000);
                localStorage.setItem(K_TMR, endTime);
                
                msg('マッサージ開始！10分測りますも！');
                draw();
                checkTimer();
            }
        }

        function checkTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            const endTime = localStorage.getItem(K_TMR);
            if (!endTime) return;

            const timerBox = document.getElementById('timer-box');
            const timerText = document.getElementById('timer-text');

            timerInterval = setInterval(() => {
                const now = Date.now();
                const diff = endTime - now;

                if (diff <= 0) {
                    clearInterval(timerInterval);
                    localStorage.removeItem(K_TMR);
                    timerBox.style.display = 'none';
                    msg('10分経ちました。お疲れ様でした！');
                    return;
                }

                timerBox.style.display = 'block';
                const mins = Math.floor(diff / 1000 / 60);
                const secs = Math.floor((diff / 1000) % 60);
                timerText.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function hdlImg(input) {
            const f = input.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const max = 400; 
                    if (width > height) { if (width > max) { height *= max / width; width = max; } }
                    else { if (height > max) { width *= max / height; height = max; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    try {
                        localStorage.setItem(K_IMG, dataUrl);
                        const v = document.getElementById('char-view');
                        v.src = dataUrl; v.style.display = 'block';
                        document.getElementById('char-txt').style.display = 'none';
                        msg('イラストを設定しました');
                    } catch (err) { msg('保存に失敗しました'); }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(f);
        }

        function doPay() {
            msg('アプリを起動します');
            const p = ['p','a','y','p','a','y',':','/','/'].join('');
            window.location.href = p;
            setTimeout(() => {
                if (confirm('補充が完了しましたか？')) {
                    rem = 10; localStorage.setItem(K_CNT, rem);
                    draw(); msg('10枚補充しました');
                }
            }, 2500);
        }

        function msg(t) {
            const el = document.getElementById('tst');
            el.innerText = t; el.classList.add('on');
            setTimeout(() => el.classList.remove('on'), 3000);
        }

        function doReset() {
            if (confirm('すべてのデータを消去しますか？')) {
                localStorage.clear(); location.reload();
            }
        }

        window.onload = startup;
    </script>
</body>
</html>
