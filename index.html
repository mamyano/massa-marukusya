<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>まるくしゃマッサージ回数券</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Yu Gothic", sans-serif; 
            background-color: #fdfaf5; 
            color: #5d4037; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh; 
        }
        .container { width: 100%; max-width: 400px; }
        .center { text-align: center; }
        
        /* イラストエリア */
        .char-box { 
            width: 140px; height: 140px; margin: 0 auto 15px; 
            border-radius: 50%; background-color: #fff; 
            border: 3px solid #e7d8c9; display: flex; align-items: center; 
            justify-content: center; overflow: hidden; cursor: pointer; position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        .char-img { width: 100%; height: 100%; object-fit: cover; }
        .char-msg { font-size: 11px; color: #bcaaa4; text-align: center; padding: 10px; line-height: 1.4; pointer-events: none; }
        
        h1 { font-size: 24px; font-weight: bold; margin-bottom: 6px; color: #5d4037; }
        .tag { 
            display: inline-block; padding: 4px 14px; background-color: #e8f5e9; 
            color: #2e7d32; font-size: 11px; border-radius: 20px; font-weight: bold; margin-bottom: 20px; 
        }
        
        /* タイマー表示エリア */
        .timer-display {
            background-color: #8d6e63;
            color: white;
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            text-align: center;
            display: none; 
            box-shadow: 0 6px 15px rgba(141, 110, 99, 0.3);
            animation: slideDown 0.3s ease;
        }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes blink { 0% { background-color: #8d6e63; } 50% { background-color: #ff5252; } 100% { background-color: #8d6e63; } }
        .timer-alert { animation: blink 0.5s infinite; }
        
        .timer-label { font-size: 12px; font-weight: bold; margin-bottom: 8px; opacity: 0.9; }
        .timer-time { font-size: 42px; font-weight: bold; font-variant-numeric: tabular-nums; margin-bottom: 12px; }
        
        .timer-controls { display: flex; gap: 10px; justify-content: center; }
        .btn-mini { 
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: bold; cursor: pointer;
        }
        .btn-mini:active { background: rgba(255,255,255,0.4); }

        /* チケット本体 */
        .ticket { 
            background: #ffffff; border: 2px dashed #8d6e63; border-radius: 28px; 
            padding: 24px; box-shadow: 0 10px 20px rgba(141, 110, 99, 0.1); 
        }
        .ticket-row { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            border-bottom: 1px solid #f3f0ee; padding-bottom: 12px; margin-bottom: 24px; 
        }
        .label { font-size: 11px; color: #a1887f; text-transform: uppercase; letter-spacing: 0.5px; }
        .num-big { font-size: 48px; font-weight: bold; color: #8d6e63; line-height: 1; }
        .price-text { font-size: 22px; font-weight: bold; color: #795548; }
        
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 24px; }
        .slot { 
            aspect-ratio: 1; border: 2px dashed #e0d7d3; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 14px; font-weight: bold; color: #d7ccc8; background: #fafafa; transition: 0.3s; 
        }
        .slot-done { 
            background-color: #8d6e63; border: 2px solid #8d6e63; color: #fff; 
            transform: scale(0.9) rotate(-8deg); box-shadow: 0 4px 8px rgba(0,0,0,0.1); 
        }
        
        .btn-use { 
            width: 100%; padding: 18px; border-radius: 20px; border: none; 
            background-color: #8d6e63; color: white; font-size: 18px; font-weight: bold; 
            box-shadow: 0 6px 15px rgba(141, 110, 99, 0.2); cursor: pointer; 
        }
        .btn-use:active { transform: scale(0.97); }
        .btn-use:disabled { background-color: #d7ccc8; cursor: not-allowed; }
        
        .footer { font-size: 11px; color: #bcaaa4; text-align: center; margin-top: 20px; }
        .toast { 
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); background: #3e2723; color: white; 
            padding: 12px 24px; border-radius: 50px; font-size: 13px; font-weight: bold; 
            opacity: 0; transition: 0.3s; pointer-events: none; z-index: 1000;
        }
        .toast.on { opacity: 1; transform: translateX(-50%) translateY(-10px); }
        .reset-btn { margin-top: 30px; font-size: 11px; color: #d7ccc8; text-decoration: underline; background: none; border: none; padding: 10px; }
        
        .test-audio-btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #fff;
            border: 1px solid #e7d8c9;
            border-radius: 15px;
            font-size: 12px;
            color: #8d6e63;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="center">
            <!-- イラストエリア -->
            <label for="file-in" class="char-box">
                <img id="char-view" class="char-img" style="display:none">
                <div id="char-txt" class="char-msg">タップして<br>イラストを選択</div>
                <input type="file" id="file-in" accept="image/*" style="display:none" onchange="hdlImg(this)">
            </label>
            
            <h1>まるくしゃマッサージ</h1>
            <div class="tag">有効期限なし</div>
        </div>

        <!-- タイマー表示 -->
        <div id="timer-box" class="timer-display">
            <div id="timer-status" class="timer-label">至福のマッサージ中...</div>
            <div id="timer-text" class="timer-time">10:00</div>
            <div class="timer-controls">
                <button id="btn-pause" class="btn-mini" onclick="togglePause()">一時停止</button>
                <button class="btn-mini" onclick="stopTimer()">終了</button>
            </div>
        </div>

        <div class="ticket">
            <div class="ticket-row">
                <div>
                    <span class="label">REMAINING</span><br>
                    <span id="cnt" class="num-big">10</span><span style="font-weight:bold; color:#8d6e63;">枚</span>
                </div>
                <div style="text-align:right">
                    <span class="label">AMOUNT</span><br>
                    <span class="price-text">1セット</span>
                </div>
            </div>

            <div class="grid" id="grid"></div>

            <button id="btn" class="btn-use" onclick="doUse()">チケットを1枚使う (10分)</button>
            <p class="footer">お疲れ様ですも。ゆっくり休んでくださいね。</p>
        </div>

        <!-- 鳴き声テストボタン -->
        <div class="center">
            <button class="test-audio-btn" onclick="testAudio()">🐄 鳴き声をテストする</button>
        </div>

        <button class="reset-btn" onclick="doReset()">データをリセット</button>
    </div>

    <div id="tst" class="toast"></div>

    <script>
        const K_CNT = 'maru_v12_c'; 
        const K_IMG = 'maru_v12_i';
        const K_TMR_LEFT = 'maru_v12_tl'; 
        const K_TMR_PAUSED = 'maru_v12_tp';
        const K_TMR_END = 'maru_v12_te';

        let rem = 10;
        let timerInterval = null;
        let wakeLock = null;

        // 音声オブジェクトの作成
        const audioBtn = new Audio('button.m4a');
        const audioAlarm = new Audio('alarm.m4a');

        function startup() {
            const c = localStorage.getItem(K_CNT);
            if (c !== null) rem = parseInt(c);
            const i = localStorage.getItem(K_IMG);
            if (i) {
                const v = document.getElementById('char-view');
                v.src = i; v.style.display = 'block';
                document.getElementById('char-txt').style.display = 'none';
            }
            draw();
            syncTimer();
            
            if ("Notification" in window) {
                Notification.requestPermission();
            }
        }

        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {}
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function draw() {
            document.getElementById('cnt').innerText = rem;
            const g = document.getElementById('grid');
            g.innerHTML = '';
            for (let i = 0; i < 10; i++) {
                const s = document.createElement('div');
                s.className = 'slot';
                if (i < (10 - rem)) {
                    s.classList.add('slot-done');
                    s.innerHTML = '✔';
                } else {
                    s.innerText = i + 1;
                }
                g.appendChild(s);
            }
            const b = document.getElementById('btn');
            if (rem <= 0) {
                b.disabled = true; b.innerText = 'チケット終了';
            } else {
                b.disabled = false; b.innerText = 'チケットを1枚使う (10分)';
            }
        }

        // 音声をiPhoneで鳴らせるように初期化する
        function initAudioOnTouch() {
            audioBtn.play().then(() => { audioBtn.pause(); audioBtn.currentTime = 0; });
            audioAlarm.play().then(() => { audioAlarm.pause(); audioAlarm.currentTime = 0; });
        }

        function doUse() {
            initAudioOnTouch();
            if (rem > 0) {
                // ボタンの音を鳴らす
                audioBtn.play();
                
                requestWakeLock();
                rem--; localStorage.setItem(K_CNT, rem);
                const tenMins = 10 * 60 * 1000;
                startNewTimer(tenMins);
                draw();
                msg('マッサージ開始だも！10分後に鳴くも！');
            }
        }

        function startNewTimer(ms) {
            localStorage.setItem(K_TMR_LEFT, ms);
            localStorage.setItem(K_TMR_PAUSED, 'false');
            localStorage.setItem(K_TMR_END, Date.now() + ms);
            syncTimer();
        }

        function togglePause() {
            initAudioOnTouch();
            const isPaused = localStorage.getItem(K_TMR_PAUSED) === 'true';
            if (isPaused) {
                requestWakeLock();
                const left = parseInt(localStorage.getItem(K_TMR_LEFT));
                localStorage.setItem(K_TMR_PAUSED, 'false');
                localStorage.setItem(K_TMR_END, Date.now() + left);
                document.getElementById('btn-pause').innerText = '一時停止';
                msg('再開しました');
            } else {
                releaseWakeLock();
                const end = parseInt(localStorage.getItem(K_TMR_END));
                const left = Math.max(0, end - Date.now());
                localStorage.setItem(K_TMR_LEFT, left);
                localStorage.setItem(K_TMR_PAUSED, 'true');
                document.getElementById('btn-pause').innerText = '再開する';
                msg('一時停止中');
            }
            syncTimer();
        }

        function syncTimer() {
            if (timerInterval) clearInterval(timerInterval);
            const leftData = localStorage.getItem(K_TMR_LEFT);
            if (!leftData) return;

            const timerBox = document.getElementById('timer-box');
            const timerText = document.getElementById('timer-text');
            const pauseBtn = document.getElementById('btn-pause');
            
            timerBox.style.display = 'block';
            timerBox.classList.remove('timer-alert');

            timerInterval = setInterval(() => {
                const isPaused = localStorage.getItem(K_TMR_PAUSED) === 'true';
                let currentLeft = 0;

                if (isPaused) {
                    currentLeft = parseInt(localStorage.getItem(K_TMR_LEFT));
                    pauseBtn.innerText = '再開する';
                    document.getElementById('timer-status').innerText = '一時停止中';
                } else {
                    const end = parseInt(localStorage.getItem(K_TMR_END));
                    currentLeft = end - Date.now();
                    pauseBtn.innerText = '一時停止';
                    document.getElementById('timer-status').innerText = '至福のマッサージ中...';
                }

                if (currentLeft <= 0) {
                    finishTimer();
                    return;
                }

                const mins = Math.floor(currentLeft / 1000 / 60);
                const secs = Math.floor((currentLeft / 1000) % 60);
                timerText.innerText = `${mins}:${secs.toString().padStart(2, '0')}`;
            }, 500);
        }

        function finishTimer() {
            clearInterval(timerInterval);
            localStorage.removeItem(K_TMR_LEFT);
            localStorage.removeItem(K_TMR_PAUSED);
            localStorage.removeItem(K_TMR_END);
            releaseWakeLock();
            
            const timerBox = document.getElementById('timer-box');
            timerBox.classList.add('timer-alert');
            document.getElementById('timer-text').innerText = "0:00";
            document.getElementById('timer-status').innerText = "終了だも！お疲れ様！";
            
            // アラーム音を鳴らす
            audioAlarm.play();
            
            if ("Notification" in window && Notification.permission === "granted") {
                new Notification("マッサージ終了だも！", { body: "お疲れ様です！" });
            }
            msg('10分経ちました！モー！');
        }

        function testAudio() {
            initAudioOnTouch();
            msg('音声をテストします...');
            audioBtn.play();
            setTimeout(() => {
                audioAlarm.play();
            }, 2000);
        }

        function stopTimer() {
            if (confirm('タイマーを強制終了しますか？')) {
                clearInterval(timerInterval);
                localStorage.removeItem(K_TMR_LEFT);
                localStorage.removeItem(K_TMR_PAUSED);
                localStorage.removeItem(K_TMR_END);
                releaseWakeLock();
                document.getElementById('timer-box').style.display = 'none';
                audioAlarm.pause();
                audioAlarm.currentTime = 0;
            }
        }

        function hdlImg(input) {
            const f = input.files[0];
            if (!f) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const max = 400; 
                    if (width > height) { if (width > max) { height *= max / width; width = max; } }
                    else { if (height > max) { width *= max / height; height = max; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
                    try {
                        localStorage.setItem(K_IMG, dataUrl);
                        const v = document.getElementById('char-view');
                        v.src = dataUrl; v.style.display = 'block';
                        document.getElementById('char-txt').style.display = 'none';
                        msg('イラストを設定しました');
                    } catch (err) { msg('保存に失敗しました'); }
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(f);
        }

        function msg(t) {
            const el = document.getElementById('tst');
            el.innerText = t; el.classList.add('on');
            setTimeout(() => el.classList.remove('on'), 3000);
        }

        function doReset() {
            if (confirm('リセットしますか？')) {
                localStorage.clear(); location.reload();
            }
        }

        window.onload = startup;
    </script>
</body>
</html>
